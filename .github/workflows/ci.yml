name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace --all-features

  package-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Package
        run: cargo package --allow-dirty -p greentic-cap

      - name: Verify package contents
        shell: bash
        run: |
          set -euo pipefail
          package_listing="$(cargo package --allow-dirty -p greentic-cap --list)"
          required_package_files=(
            "Cargo.lock"
            "README.md"
            "LICENSE"
            "src/main.rs"
            "docs/capability_outputs.md"
            "examples/capability/bundle_resolution.json"
            "examples/capability/component_descriptor.json"
            "examples/capability/dw_generic_declaration.json"
            "examples/capability/pack_capabilities.declaration.json"
          )
          for required_file in "${required_package_files[@]}"; do
            if ! printf '%s\n' "$package_listing" | grep -Fxq "$required_file"; then
              printf 'Missing required packaged file: %s\n' "$required_file" >&2
              exit 1
            fi
          done

      - name: Publish dry run
        run: cargo publish --dry-run --allow-dirty -p greentic-cap
