name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must match v<package version>)"
        required: true
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run local checks
        run: bash ci/local_check.sh

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)"
          expected="v${version}"
          actual="${GITHUB_REF_NAME}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            actual="${{ inputs.tag }}"
          fi
          if [ "$actual" != "$expected" ]; then
            printf 'Expected tag %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

  publish-crates:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Dry run publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run --allow-dirty -p greentic-cap

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          attempt=1
          max_attempts=3
          until cargo publish --allow-dirty -p greentic-cap; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 10
          done
