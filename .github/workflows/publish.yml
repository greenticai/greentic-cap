name: Publish

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must match v<package version>)"
        required: true
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace --all-features

  verify-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run local checks
        run: bash ci/local_check.sh

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)"
          expected="v${version}"
          actual="${GITHUB_REF_NAME}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            actual="${{ inputs.tag }}"
          fi
          if [ "$actual" != "$expected" ]; then
            printf 'Expected tag %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

  publish-crates-main:
    needs: [lint, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            greentic-cap-types
            greentic-cap-profile
            greentic-cap-resolver
            greentic-cap-schema
            greentic-cap-core
            greentic-cap
          )
          for package in "${packages[@]}"; do
            output=""
            set +e
            output="$(cargo publish --allow-dirty -p "$package" 2>&1)"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              printf '%s\n' "$output"
              continue
            fi
            if printf '%s\n' "$output" | grep -Eiq 'already (exists|uploaded)|version .*already|crate .*already'; then
              printf '%s\n' "$output"
              printf '%s already exists on crates.io; treating as success\n' "$package"
              continue
            fi
            printf '%s\n' "$output" >&2
            exit "$status"
          done

  publish-crates-release:
    needs: verify-release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            greentic-cap-types
            greentic-cap-profile
            greentic-cap-resolver
            greentic-cap-schema
            greentic-cap-core
            greentic-cap
          )
          for package in "${packages[@]}"; do
            output=""
            set +e
            output="$(cargo publish --allow-dirty -p "$package" 2>&1)"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              printf '%s\n' "$output"
              continue
            fi
            if printf '%s\n' "$output" | grep -Eiq 'already (exists|uploaded)|version .*already|crate .*already'; then
              printf '%s\n' "$output"
              printf '%s already exists on crates.io; treating as success\n' "$package"
              continue
            fi
            printf '%s\n' "$output" >&2
            exit "$status"
          done
