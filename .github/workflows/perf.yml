name: Perf
# Nightly-only. See plans/binary-bifurcation.md Phase A.8: push-trigger removed
# because post-merge perf runs were burning 15+ min without actionable signal
# (regressions surface at next nightly, and the fast perf_scaling/perf_timeout
# guard tests aren't the bottleneck — cargo bench is).

on:
  schedule:
    - cron: "34 3 * * *"
  workflow_dispatch:

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/rust-setup

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install perf tools
        run: cargo binstall --no-confirm --force greentic-dev cargo-nextest cargo-llvm-cov

      - name: Run perf guard tests
        run: cargo test --workspace --all-features --test perf_scaling --test perf_timeout

      - name: Run benchmark smoke
        run: cargo bench --bench perf -- --sample-size 10
