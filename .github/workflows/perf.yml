name: Perf
# Moved off pull_request onto a nightly schedule. See plans/binary-bifurcation.md
# Phase A (heavy-job sweep). Manual runs remain via workflow_dispatch. push
# trigger preserved so main-merge still catches regressions immediately.

on:
  schedule:
    - cron: "34 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/rust-setup

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install perf tools
        run: cargo binstall --no-confirm --force greentic-dev cargo-nextest cargo-llvm-cov

      - name: Run perf guard tests
        run: cargo test --workspace --all-features --test perf_scaling --test perf_timeout

      - name: Run benchmark smoke
        run: cargo bench --bench perf -- --sample-size 10
